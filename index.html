<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alvian Novadiansyah Landing Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }
    header {
      padding: 80px 20px;
      background: linear-gradient(135deg, #6e00ff, #00c6ff);
    }
    header h1 { font-size: 3rem; margin-bottom: 15px; }
    header p { font-size: 1.2rem; margin-bottom: 30px; opacity: 0.9; }
    .btn {
      background: white;
      color: #6e00ff;
      padding: 14px 36px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
    }
    .btn:hover { opacity: 0.85; }
    .features {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      padding: 60px 20px;
    }
    .card {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 30px;
      width: 250px;
    }
    .card h3 { margin-bottom: 10px; color: #00c6ff; }
    footer {
      padding: 20px;
      background: #111;
      color: #888;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Welcome to My Page</h1>
    <p>A simple, beautiful landing page hosted for free.</p>
    <a href="#features" class="btn">Get Started</a>
  </header>

  <section class="features" id="features">
    <div class="card">
      <h3>⚡ Fast</h3>
      <p>Lightning-fast performance with zero cost hosting.</p>
    </div>
    <div class="card">
      <h3>🎨 Beautiful</h3>
      <p>Clean and modern design out of the box.</p>
    </div>
    <div class="card">
      <h3>🔒 Free</h3>
      <p>100% free forever with GitHub Pages.</p>
    </div>
  </section>

  <footer>
    <p>© 2026 My Landing Page. Built with GitHub Pages.</p>
  </footer>

</body>
</html>
